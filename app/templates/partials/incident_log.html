<div id="incident-log-wrapper">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-lg font-semibold">Incident Log</h2>
    <a href="/incidents/export" class="text-xs px-3 py-1 rounded border border-edge text-textmuted hover:text-textprimary hover:border-textmuted">
      Export CSV
    </a>
  </div>
  {% if not incidents %}
  <p class="text-sm text-textmuted">No actions logged yet.</p>
  {% else %}
  <div class="overflow-x-auto">
    <table class="w-full text-sm" aria-label="Incident log">
      <thead>
        <tr class="text-left text-textmuted border-b border-edge">
          <th scope="col" class="py-2 pr-4">Time</th>
          <th scope="col" class="py-2 pr-4">Zone</th>
          <th scope="col" class="py-2 pr-4">Action Taken</th>
          <th scope="col" class="py-2">Status</th>
        </tr>
      </thead>
      <tbody>
        {% for inc in incidents %}
        <tr class="border-b border-edge/50">
          <td class="py-2 pr-4 text-textmuted">{{ inc.timestamp }}</td>
          <td class="py-2 pr-4">{{ inc.zone_name }}</td>
          <td class="py-2 pr-4">{{ inc.action_taken }}</td>
          <td class="py-2">{{ inc.status_at_time.value }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% endif %}
</div>
