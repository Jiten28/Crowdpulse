services:
  - type: web
    name: crowdpulse
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL
        value: claude-sonnet-5
      - key: MAX_UPLOAD_MB
        value: "2"
      - key: RATE_LIMIT_CHAT_PER_MIN
        value: "10"
      - key: ALLOWED_ORIGIN
        value: "*"
